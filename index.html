<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workshop">
<meta name="mobile-web-app-capable" content="yes">
<title>Workshop Pro · المخزن</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- ZXing barcode scanner library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js" defer></script>

<style>
/* ════ RESET & VARIABLES ════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:      #080a0d;
  --bg2:     #0d1016;
  --bg3:     #131820;
  --card:    #181f28;
  --border:  #1d2535;
  --border2: #242f40;
  --accent:  #00d4ff;
  --green:   #00e87a;
  --red:     #ff2d55;
  --orange:  #ff9500;
  --yellow:  #ffd60a;
  --purple:  #bf5af2;
  --text:    #e8edf5;
  --text2:   #7a8799;
  --text3:   #3d4e63;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; overflow: hidden; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
  position: fixed;
  width: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ════ SCREENS SYSTEM ════ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transform: translateX(30px);
  transition: opacity .25s ease, transform .25s ease;
  overflow: hidden;
}
.screen.active {
  opacity: 1; pointer-events: all;
  transform: translateX(0);
}
.screen.slide-left {
  transform: translateX(-30px);
  opacity: 0; pointer-events: none;
}

/* ════ SCROLLABLE CONTENT ════ */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: calc(80px + var(--safe-bot));
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ════ STATUS BAR SPACER ════ */
.status-bar {
  height: calc(var(--safe-top) + 0px);
  background: var(--bg2);
  flex-shrink: 0;
}

/* ════ TOP HEADER ════ */
.top-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
.top-bar-title {
  font-size: 17px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.back-btn {
  width: 36px; height: 36px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer;
  transition: background .15s;
}
.back-btn:active { background: var(--border2); }

/* ════ BOTTOM NAV ════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(60px + var(--safe-bot));
  background: rgba(13,16,22,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bot);
  z-index: 1000;
}
.nav-tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all .15s;
  padding: 8px 4px;
  border: none; background: none;
  position: relative;
}
.nav-tab .n-icon { font-size: 22px; transition: transform .2s; }
.nav-tab .n-label { font-size: 10px; color: var(--text3); font-family: 'Tajawal'; transition: color .2s; }
.nav-tab.active .n-icon { transform: translateY(-2px); }
.nav-tab.active .n-label { color: var(--accent); }
.nav-tab.active::after {
  content: '';
  position: absolute; top: 0; left: 25%; right: 25%;
  height: 2px; background: var(--accent);
  border-radius: 0 0 2px 2px;
}
.nav-tab:active .n-icon { transform: scale(0.88); }

/* ══════════════════════════════════════
   SCREEN 1: HOME (القسم الرئيسي)
══════════════════════════════════════ */

/* Logo Section */
.home-logo {
  padding: 20px 18px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.logo-badge {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 20px rgba(0,212,255,0.4);
  animation: logoPulse 3s infinite;
  flex-shrink: 0;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 15px rgba(0,212,255,0.3); }
  50%      { box-shadow: 0 0 30px rgba(0,212,255,0.7); }
}
.logo-info {}
.logo-name { font-size: 17px; font-weight: 800; letter-spacing: .3px; }
.logo-sub  { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono'; margin-top: 1px; }

/* Today Stats Strip */
.stats-strip {
  display: flex; gap: 0;
  padding: 0 0 2px;
  overflow-x: auto;
  background: var(--bg2);
}
.stats-strip::-webkit-scrollbar { display: none; }
.stat-chip {
  flex-shrink: 0;
  padding: 10px 16px;
  text-align: center;
  border-left: 1px solid var(--border);
}
.stat-chip:last-child { border-left: none; }
.stat-chip-val { font-size: 20px; font-weight: 900; font-family: 'JetBrains Mono'; }
.stat-chip-lbl { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* Section Grid */
.section-label {
  font-size: 11px; color: var(--text3);
  font-family: 'JetBrains Mono'; letter-spacing: 2px;
  text-transform: uppercase;
  padding: 18px 18px 10px;
}

.sections-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 14px;
}

.sec-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 14px;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
  active-state: none;
}
.sec-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity .15s;
}
.sec-card:active { transform: scale(0.96); }
.sec-card:active::before { opacity: 1; background: rgba(255,255,255,0.04); }

.sec-card-icon { font-size: 28px; margin-bottom: 8px; }
.sec-card-name { font-size: 14px; font-weight: 700; }
.sec-card-count {
  font-size: 11px; color: var(--text3);
  margin-top: 3px; font-family: 'JetBrains Mono';
}
.sec-card-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 16px 16px;
}

/* Quick Scan FAB */
.fab {
  position: fixed;
  bottom: calc(70px + var(--safe-bot));
  left: 50%; transform: translateX(-50%);
  width: 62px; height: 62px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 24px rgba(0,212,255,0.5);
  cursor: pointer; z-index: 999;
  border: none;
  transition: all .2s;
  animation: fabPulse 2.5s infinite;
}
@keyframes fabPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
  50%      { box-shadow: 0 4px 35px rgba(0,212,255,0.75); }
}
.fab:active { transform: translateX(-50%) scale(0.9); }

/* ══════════════════════════════════════
   SCREEN 2: SECTION DETAIL
══════════════════════════════════════ */
.sec-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.sec-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sec-icon-big {
  width: 46px; height: 46px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  background: var(--card); border: 1px solid var(--border2);
}
.sec-header-name { font-size: 18px; font-weight: 800; }
.sec-header-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }

.action-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.action-big {
  border-radius: 14px;
  padding: 14px 12px;
  border: 1px solid;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all .15s;
  background: none;
  font-family: 'Tajawal';
}
.action-big:active { transform: scale(0.96); }
.action-big .ab-icon { font-size: 24px; flex-shrink: 0; }
.action-big .ab-text {}
.action-big .ab-label { font-size: 15px; font-weight: 700; }
.action-big .ab-sub   { font-size: 11px; opacity: .6; margin-top: 1px; }

.in-btn  { color: var(--green);  border-color: rgba(0,232,122,.3);  background: rgba(0,232,122,.06); }
.out-btn { color: var(--red);    border-color: rgba(255,45,85,.3);   background: rgba(255,45,85,.06); }

/* Logs List */
.logs-list { padding: 14px; }
.log-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
}
.log-dot {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.dot-in  { background: rgba(0,232,122,.12); color: var(--green); }
.dot-out { background: rgba(255,45,85,.12);  color: var(--red); }
.dot-cut { background: rgba(255,149,0,.12);  color: var(--orange); }

.log-info { flex: 1; min-width: 0; }
.log-name  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-code  { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono'; margin-top: 2px; }
.log-notes { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.log-meta  { text-align: left; flex-shrink: 0; }
.log-time  { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono'; }
.log-qty   { font-size: 13px; font-weight: 700; margin-top: 2px; }

/* ══════════════════════════════════════
   SCREEN 3: SCANNER
══════════════════════════════════════ */
#screen-scanner {
  background: #000;
}
.scanner-header {
  background: rgba(8,10,13,0.9);
  backdrop-filter: blur(10px);
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.scanner-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.scanner-mode {
  font-size: 12px;
  padding: 5px 12px; border-radius: 20px;
  font-weight: 700;
  transition: all .2s;
}
.mode-in  { background: rgba(0,232,122,.2); color: var(--green); border: 1px solid rgba(0,232,122,.4); }
.mode-out { background: rgba(255,45,85,.2);  color: var(--red);   border: 1px solid rgba(255,45,85,.4); }

/* Video container */
.cam-wrap {
  flex: 1; position: relative; overflow: hidden;
}
#cam-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.cam-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}

/* Scan frame animation */
.scan-box {
  width: 220px; height: 220px;
  position: relative;
}
.scan-box .corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: var(--accent);
  border-style: solid;
}
.corner.tl { top:0;    right:0;  border-width: 3px 0 0 3px; border-radius: 0 0 0 5px; transform: rotate(180deg); }
.corner.tr { top:0;    left:0;   border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
.corner.bl { bottom:0; right:0;  border-width: 0 0 3px 3px; border-radius: 5px 0 0 0; }
.corner.br { bottom:0; left:0;   border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }

.scan-line {
  position: absolute;
  left: 8px; right: 8px; top: 8px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  box-shadow: 0 0 12px rgba(0,212,255,0.8);
  animation: scanLine 2s ease-in-out infinite;
}
@keyframes scanLine {
  0%   { top: 8px; }
  50%  { top: 204px; }
  100% { top: 8px; }
}

.scan-hint {
  margin-top: 20px;
  font-size: 13px; color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.5);
  padding: 8px 16px; border-radius: 20px;
  text-align: center;
}

/* Result panel (slides up) */
.result-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 0 18px 24px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(0.34,1.2,0.64,1);
  z-index: 20;
  max-height: 75vh;
  overflow-y: auto;
}
.result-panel.open { transform: translateY(0); }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 16px;
}

.result-code {
  background: var(--card);
  border: 1px solid rgba(0,212,255,.3);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'JetBrains Mono'; font-size: 14px;
  color: var(--accent); text-align: center;
  letter-spacing: 1px; margin-bottom: 14px;
  word-break: break-all;
}

/* Form inputs */
.field-group { margin-bottom: 12px; }
.field-label {
  font-size: 11px; color: var(--text2);
  margin-bottom: 5px; display: block;
  font-family: 'JetBrains Mono';
}
.field-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Tajawal'; font-size: 15px;
  outline: none; direction: rtl;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text3); }

.fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.confirm-btn {
  width: 100%; padding: 16px;
  border-radius: 14px; border: none;
  font-family: 'Tajawal'; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  margin-top: 6px; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.confirm-btn:active { transform: scale(0.97); }
.confirm-in  { background: var(--green); color: #051a0d; }
.confirm-out { background: var(--red);   color: #fff; }

.cancel-btn {
  width: 100%; padding: 13px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 14px;
  color: var(--text2); font-family: 'Tajawal'; font-size: 14px;
  cursor: pointer; margin-top: 8px;
  transition: all .15s;
}
.cancel-btn:active { background: var(--border2); }

/* Manual input row */
.manual-row {
  display: flex; gap: 8px;
  padding: 12px 18px;
  background: rgba(8,10,13,0.9);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.manual-input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text); font-family: 'Tajawal'; font-size: 14px;
  outline: none; direction: rtl;
}
.manual-input::placeholder { color: rgba(255,255,255,0.3); }
.manual-btn {
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 10px;
  padding: 10px 16px;
  font-family: 'Tajawal'; font-size: 13px; font-weight: 700;
  cursor: pointer;
}

/* ══════════════════════════════════════
   SCREEN 4: REPORTS
══════════════════════════════════════ */
.filter-scroll {
  display: flex; gap: 8px;
  padding: 12px 14px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--text2); font-size: 13px; font-family: 'Tajawal';
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip.active {
  background: rgba(0,212,255,.12);
  border-color: rgba(0,212,255,.4);
  color: var(--accent);
}
.chip:active { transform: scale(0.95); }

.report-logs { padding: 12px 14px; }

.report-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  transition: border-color .15s;
}

.rc-top { display: flex; align-items: flex-start; justify-content: space-between; }
.rc-name { font-size: 14px; font-weight: 700; }
.rc-tag  {
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.tag-in  { background: rgba(0,232,122,.15); color: var(--green); }
.tag-out { background: rgba(255,45,85,.15);  color: var(--red); }
.tag-cut { background: rgba(255,149,0,.15);  color: var(--orange); }

.rc-code  { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono'; margin-top: 4px; }
.rc-meta  { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.rc-sec   { font-size: 12px; color: var(--text2); }
.rc-time  { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono'; }
.rc-notes { font-size: 12px; color: var(--text2); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

/* ══════════════════════════════════════
   SCREEN 5: INVENTORY
══════════════════════════════════════ */
.search-bar {
  padding: 12px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px 16px 12px 40px;
  color: var(--text);
  font-family: 'Tajawal'; font-size: 15px;
  outline: none; direction: rtl;
}
.search-input::placeholder { color: var(--text3); }
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px; pointer-events: none;
}

.inv-list { padding: 12px 14px; }
.inv-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer; transition: border-color .15s;
}
.inv-card:active { border-color: var(--border2); }

.inv-top { display: flex; align-items: center; justify-content: space-between; }
.inv-name { font-size: 14px; font-weight: 700; flex: 1; }
.inv-qty  {
  font-size: 18px; font-weight: 900;
  font-family: 'JetBrains Mono';
  min-width: 40px; text-align: left;
}
.inv-code { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono'; margin-top: 3px; }
.inv-bot  { display: flex; justify-content: space-between; margin-top: 8px; }
.inv-sec  { font-size: 12px; color: var(--text2); }
.inv-price{ font-size: 12px; color: var(--text2); }
.inv-notes{ font-size: 12px; color: var(--text3); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }

/* ══════════════════════════════════════
   MODALS & OVERLAYS
══════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 2000;
  display: none;
  align-items: flex-end;
}
.overlay.open { display: flex; }

.bottom-sheet {
  width: 100%; background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border2);
  padding: 0 18px calc(20px + var(--safe-bot));
  max-height: 88vh;
  overflow-y: auto;
  animation: sheetUp .3s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2); border-radius: 2px;
  margin: 10px auto 18px;
}
.sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast {
  position: fixed;
  top: calc(var(--safe-top) + 60px);
  left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--card);
  border: 1px solid var(--green);
  color: var(--green);
  padding: 12px 22px; border-radius: 30px;
  font-size: 14px; font-weight: 600;
  white-space: nowrap;
  transition: transform .3s cubic-bezier(0.34,1.2,0.64,1);
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(0,232,122,0.3);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty {
  text-align: center; padding: 48px 24px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ══════════════════════════════════════
   MISC UTILS
══════════════════════════════════════ */
.divider { height: 1px; background: var(--border); margin: 4px 0; }
.section-sub-label {
  font-size: 11px; color: var(--text3);
  font-family: 'JetBrains Mono'; letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px 18px 8px;
}
</style>
</head>

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════ -->
<script>
'use strict';

// ══ CONFIG ══════════════════════════════════════════════════
const SECTIONS = [
  { id:'mobile', name:'موبايلات',        icon:'📱', color:'#bf5af2' },
  { id:'pc',     name:'لابات و PC',      icon:'🖥️', color:'#00d4ff' },
  { id:'screen', name:'شاشات',           icon:'🖵',  color:'#00d4ff' },
  { id:'parts',  name:'قطع غيار',        icon:'🔧', color:'#ff9500' },
  { id:'cut',    name:'تقطيع (خردة)',    icon:'⚙️', color:'#ff9500' },
  { id:'acc',    name:'اكسسوارات',       icon:'🎧', color:'#ffd60a' },
  { id:'cable',  name:'كبلات',           icon:'🔌', color:'#8a95a5' },
];

const SEC_MAP = Object.fromEntries(SECTIONS.map(s => [s.id, s]));

// ══ DATABASE (IndexedDB) ════════════════════════════════════
let db;

function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('WorkshopDB', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('items')) {
        const s = d.createObjectStore('items', { keyPath:'code' });
        s.createIndex('section','section',{unique:false});
      }
      if (!d.objectStoreNames.contains('logs')) {
        const l = d.createObjectStore('logs', { keyPath:'id', autoIncrement:true });
        l.createIndex('section','section',{unique:false});
        l.createIndex('action','action',{unique:false});
        l.createIndex('timestamp','timestamp',{unique:false});
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror   = e => rej(e);
  });
}

function dbTx(store, mode='readonly') {
  return db.transaction(store, mode).objectStore(store);
}

function getAllFrom(store, indexName=null, query=null) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly').objectStore(store);
    const target = indexName ? tx.index(indexName) : tx;
    const req = query ? target.getAll(query) : target.getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

function putRecord(store, data) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

function getRecord(store, key) {
  return new Promise((res, rej) => {
    const req = dbTx(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

// ══ STATE ════════════════════════════════════════════════════
let currentSection = 'mobile';
let currentAction  = 'in';
let cameraStream   = null;
let scanActive     = false;
let lastScannedCode = '';
let lastScanTime    = 0;
let reportFilter    = 'all';
let zxingReader     = null;
let scanAnimFrame   = null;

// ══ NAVIGATION ═══════════════════════════════════════════════
function switchTab(tab) {
  // Hide all screens
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.classList.add('slide-left');
    setTimeout(() => s.classList.remove('slide-left'), 300);
  });

  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + tab);
  if (tabEl) tabEl.classList.add('active');

  // Show target
  setTimeout(() => {
    const screen = document.getElementById('screen-' + tab);
    if (screen) screen.classList.add('active');
  }, 10);

  if (tab === 'home')      refreshHome();
  if (tab === 'reports')   renderReports();
  if (tab === 'inventory') renderInventory();
}

function goBack(target) {
  stopScanner();
  switchTab(target);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ══ HOME ═════════════════════════════════════════════════════
async function refreshHome() {
  // Clock
  updateClock();

  // Stats
  const logs = await getAllFrom('logs');
  const today = new Date().toDateString();
  const todayLogs = logs.filter(l => new Date(l.timestamp).toDateString() === today);

  document.getElementById('stat-in').textContent  = todayLogs.filter(l=>l.action==='in').length;
  document.getElementById('stat-out').textContent = todayLogs.filter(l=>l.action==='out').length;
  document.getElementById('stat-ops').textContent = todayLogs.length;

  const items = await getAllFrom('items');
  document.getElementById('stat-items').textContent = items.length;

  // Sections grid
  const grid = document.getElementById('sections-grid');
  grid.innerHTML = '';

  for (const sec of SECTIONS) {
    const secItems = items.filter(i => i.section === sec.id);
    const secLogs  = todayLogs.filter(l => l.section === sec.id);
    const card = document.createElement('div');
    card.className = 'sec-card';
    card.innerHTML = `
      <div class="sec-card-icon">${sec.icon}</div>
      <div class="sec-card-name">${sec.name}</div>
      <div class="sec-card-count">${secItems.length} صنف · ${secLogs.length} اليوم</div>
      <div class="sec-card-bar" style="background:${sec.color}22;border-top:2px solid ${sec.color}55"></div>
    `;
    card.onclick = () => openSection(sec.id);
    grid.appendChild(card);
  }
}

function updateClock() {
  const el = document.getElementById('home-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('ar-EG',{hour12:false});
}

// ══ SECTION SCREEN ═══════════════════════════════════════════
async function openSection(secId) {
  currentSection = secId;
  const sec = SEC_MAP[secId];

  document.getElementById('sec-screen-title').textContent = sec.icon + ' ' + sec.name;
  document.getElementById('sec-icon-big').textContent     = sec.icon;
  document.getElementById('sec-header-name').textContent  = sec.name;

  const items = await getAllFrom('items');
  const secItems = items.filter(i => i.section === secId);
  const logs = await getAllFrom('logs');
  const today = new Date().toDateString();
  const todayOps = logs.filter(l => l.section===secId && new Date(l.timestamp).toDateString()===today).length;
  document.getElementById('sec-header-sub').textContent = `${secItems.length} صنف مسجل · ${todayOps} عملية اليوم`;

  // Render logs
  const secLogs = logs.filter(l => l.section === secId)
                      .sort((a,b) => b.id - a.id)
                      .slice(0, 50);
  const container = document.getElementById('section-logs');
  container.innerHTML = secLogs.length ? '' : `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">لا توجد عمليات بعد<br>ابدأ بمسح الباركود</div></div>`;

  secLogs.forEach(log => {
    const dotCls = log.action==='in' ? 'dot-in' : (secId==='cut'?'dot-cut':'dot-out');
    const icon   = log.action==='in' ? '↓' : '↑';
    const ts     = new Date(log.timestamp).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',hour12:false});
    const el     = document.createElement('div');
    el.className = 'log-item';
    el.innerHTML = `
      <div class="log-dot ${dotCls}">${icon}</div>
      <div class="log-info">
        <div class="log-name">${log.name}</div>
        <div class="log-code">${log.code}</div>
        ${log.notes ? `<div class="log-notes">📝 ${log.notes}</div>` : ''}
      </div>
      <div class="log-meta">
        <div class="log-time">${ts}</div>
        <div class="log-qty" style="color:${log.action==='in'?'var(--green)':'var(--red)'}">
          ${log.action==='in'?'+':'-'}${log.qty}
        </div>
      </div>`;
    container.appendChild(el);
  });

  // Remove tabs, show section screen
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-section').classList.add('active');
}

// ══ SCANNER ══════════════════════════════════════════════════
function openScanner(action) {
  currentAction = action;
  const badge = document.getElementById('scan-mode-badge');
  const btn   = document.getElementById('confirm-scan-btn');

  if (action === 'in') {
    badge.textContent = 'مدخلات';
    badge.className   = 'scanner-mode mode-in';
    btn.className     = 'confirm-btn confirm-in';
    btn.textContent   = '✅ تأكيد الدخول';
  } else {
    badge.textContent = 'مخرجات';
    badge.className   = 'scanner-mode mode-out';
    btn.className     = 'confirm-btn confirm-out';
    btn.textContent   = '✅ تأكيد الخروج';
  }

  closeResultPanel();
  document.getElementById('manual-code').value = '';
  document.getElementById('scan-hint').textContent = 'وجّه الكاميرا على الباركود أو QR';

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-scanner').classList.add('active');
  startCamera();
}

function openQuickScan() {
  currentSection = 'mobile'; // default, user can switch
  openScanner('in');
}

async function startCamera() {
  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      }
    };
    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('cam-video');
    video.srcObject = cameraStream;
    await video.play();

    scanActive = true;
    scanLoop();
  } catch(err) {
    document.getElementById('scan-hint').textContent = '⚠️ تعذّر فتح الكاميرا · أدخل الكود يدوياً';
    console.error('Camera error:', err);
  }
}

function scanLoop() {
  if (!scanActive) return;
  const video  = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  if (!video.videoWidth) { scanAnimFrame = requestAnimationFrame(scanLoop); return; }

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  try {
    // Use ZXing if available
    if (typeof ZXing !== 'undefined') {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const hints = new Map();
      const reader = new ZXing.BrowserMultiFormatReader();
      const lum = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
      const binarizer = new ZXing.HybridBinarizer(lum);
      const bitmap  = new ZXing.BinaryBitmap(binarizer);
      try {
        const result = reader.decodeBitmap(bitmap);
        if (result) onCodeFound(result.getText(), 'SCAN');
      } catch(e) {}
    }
  } catch(e) {}

  scanAnimFrame = requestAnimationFrame(() => setTimeout(scanLoop, 100));
}

function onCodeFound(code, type) {
  code = code.trim();
  const now = Date.now();
  if (!code || (code === lastScannedCode && now - lastScanTime < 2500)) return;
  lastScannedCode = code;
  lastScanTime    = now;

  // vibrate
  if (navigator.vibrate) navigator.vibrate([80]);

  document.getElementById('scan-hint').textContent = '✅ تم اكتشاف الكود!';
  openResultPanel(code);
}

async function openResultPanel(code) {
  document.getElementById('result-code').textContent = code;
  document.getElementById('r-name').value  = '';
  document.getElementById('r-qty').value   = '1';
  document.getElementById('r-price').value = '';
  document.getElementById('r-notes').value = '';

  // بحث عن الصنف في الـ DB
  const item = await getRecord('items', code);
  if (item) {
    document.getElementById('r-name').value = item.name;
  }

  document.getElementById('result-panel').classList.add('open');
}

function closeResultPanel() {
  document.getElementById('result-panel').classList.remove('open');
  lastScannedCode = '';
  document.getElementById('scan-hint').textContent = 'وجّه الكاميرا على الباركود أو QR';
}

function stopScanner() {
  scanActive = false;
  if (scanAnimFrame) cancelAnimationFrame(scanAnimFrame);
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('cam-video').srcObject = null;
}

function manualEnter() {
  const code = document.getElementById('manual-code').value.trim();
  if (code) openResultPanel(code);
}

async function confirmScan() {
  const code  = document.getElementById('result-code').textContent.trim();
  const name  = document.getElementById('r-name').value.trim();
  const qty   = parseInt(document.getElementById('r-qty').value) || 1;
  const price = parseFloat(document.getElementById('r-price').value) || 0;
  const notes = document.getElementById('r-notes').value.trim();

  if (!code || code === '—') return;
  if (!name) {
    document.getElementById('r-name').focus();
    document.getElementById('r-name').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('r-name').style.borderColor = '', 1500);
    return;
  }

  // Save log
  const log = { code, name, section:currentSection, action:currentAction,
                qty, price, notes, timestamp:new Date().toISOString() };
  await putRecord('logs', log);

  // Update item
  const existing = await getRecord('items', code);
  const newQty   = ((existing?.qty||0)) + (currentAction==='in' ? qty : -qty);
  await putRecord('items', {
    code, name, section:currentSection,
    qty: Math.max(0, newQty),
    buy_price:  existing?.buy_price  || (currentAction==='in'  ? price : 0),
    sell_price: existing?.sell_price || (currentAction==='out' ? price : 0),
    notes: notes || existing?.notes || '',
    updated_at: new Date().toISOString(),
  });

  closeResultPanel();
  stopScanner();

  const secName = SEC_MAP[currentSection]?.name || currentSection;
  showToast(`${currentAction==='in'?'✅ دخول':'✅ خروج'} · "${name}" · ${qty} قطعة`);

  // Go back to section
  await openSection(currentSection);
}

// ══ REPORTS ══════════════════════════════════════════════════
async function renderReports() {
  const allLogs = await getAllFrom('logs');
  const now  = new Date();
  const today = now.toDateString();
  const weekAgo = new Date(now - 7*24*3600*1000);

  let filtered = [...allLogs].sort((a,b) => b.id - a.id);

  if (reportFilter === 'in')    filtered = filtered.filter(l => l.action === 'in');
  if (reportFilter === 'out')   filtered = filtered.filter(l => l.action === 'out');
  if (reportFilter === 'cut')   filtered = filtered.filter(l => l.section === 'cut');
  if (reportFilter === 'today') filtered = filtered.filter(l => new Date(l.timestamp).toDateString()===today);
  if (reportFilter === 'week')  filtered = filtered.filter(l => new Date(l.timestamp) >= weekAgo);

  const container = document.getElementById('report-logs');
  container.innerHTML = filtered.length ? '' : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">لا توجد عمليات في هذه الفترة</div></div>`;

  filtered.slice(0, 200).forEach(log => {
    const tagCls = log.action==='in' ? 'tag-in' : (log.section==='cut'?'tag-cut':'tag-out');
    const tagLbl = log.action==='in' ? '↓ دخول' : '↑ خروج';
    const ts     = new Date(log.timestamp).toLocaleString('ar-EG',{
      day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
    const sec    = SEC_MAP[log.section];
    const el = document.createElement('div');
    el.className = 'report-card';
    el.innerHTML = `
      <div class="rc-top">
        <div class="rc-name">${log.name}</div>
        <span class="rc-tag ${tagCls}">${tagLbl}</span>
      </div>
      <div class="rc-code">${log.code}</div>
      <div class="rc-meta">
        <div class="rc-sec">${sec?.icon||''} ${sec?.name||log.section} · ${log.qty} قطعة${log.price?` · ${log.price}ج`:''}</div>
        <div class="rc-time">${ts}</div>
      </div>
      ${log.notes ? `<div class="rc-notes">📝 ${log.notes}</div>` : ''}
    `;
    container.appendChild(el);
  });
}

function setReportFilter(f, el) {
  reportFilter = f;
  document.querySelectorAll('#report-filters .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderReports();
}

// ══ INVENTORY ════════════════════════════════════════════════
async function renderInventory() {
  const kw    = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  let items = await getAllFrom('items');
  items.sort((a,b) => (b.updated_at||'').localeCompare(a.updated_at||''));

  if (kw) {
    items = items.filter(i =>
      i.name?.toLowerCase().includes(kw) ||
      i.code?.toLowerCase().includes(kw) ||
      i.notes?.toLowerCase().includes(kw));
  }

  const container = document.getElementById('inv-list');
  container.innerHTML = items.length ? '' : `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">${kw?'لا توجد نتائج للبحث':'المخزن فاضي دلوقتي'}</div></div>`;

  items.forEach(item => {
    const sec = SEC_MAP[item.section];
    const qtyColor = item.qty <= 0 ? 'var(--red)' : item.qty <= 2 ? 'var(--orange)' : 'var(--green)';
    const el  = document.createElement('div');
    el.className = 'inv-card';
    el.innerHTML = `
      <div class="inv-top">
        <div class="inv-name">${item.name}</div>
        <div class="inv-qty" style="color:${qtyColor}">${item.qty}</div>
      </div>
      <div class="inv-code">${item.code}</div>
      <div class="inv-bot">
        <div class="inv-sec">${sec?.icon||''} ${sec?.name||item.section}</div>
        <div class="inv-price">${item.buy_price?`شراء: ${item.buy_price}ج`:''}${item.sell_price?` · بيع: ${item.sell_price}ج`:''}</div>
      </div>
      ${item.notes ? `<div class="inv-notes">📝 ${item.notes}</div>` : ''}
    `;
    container.appendChild(el);
  });
}

// ══ TOAST ════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  el.style.color       = isError ? 'var(--red)' : 'var(--green)';
  el.style.boxShadow   = isError ? '0 4px 20px rgba(255,45,85,0.3)' : '0 4px 20px rgba(0,232,122,0.3)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
